<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Page introuvable (404) - TEDxUTTroyes</title>
  <meta name="description" content="La page demandée n'existe pas ou a été déplacée.">
  <meta name="robots" content="noindex">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="/css/normalize.css" rel="stylesheet" type="text/css">
  <link href="/css/webflow.css" rel="stylesheet" type="text/css">
  <link href="/css/genius-utt.webflow.css" rel="stylesheet" type="text/css">
  <link href="/images/favicon.png" rel="shortcut icon" type="image/x-icon">
  <link href="/images/webclip.png" rel="apple-touch-icon">
  <style>
    .err-wrap{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;gap:18px}
    .err-code{font-size:96px;font-weight:800;line-height:1;color:#db1f37;margin:0}
    .err-title{font-size:24px;font-weight:700;margin:0}
    .err-text{max-width:520px;color:#1b1a1a}
    .err-btn{display:inline-block;background:#db1f37;color:#fff;padding:12px 26px;border-radius:8px;text-decoration:none;font-weight:600}
  </style>
</head>
<body>
  <main class="err-wrap">
    <a href="/index.html"><img src="/images/logo-black.png" width="180" alt="TEDxUTTroyes"></a>
    <p class="err-code">404</p>
    <h1 class="err-title">Cette page est introuvable</h1>
    <p class="err-text">Le lien est peut-être erroné ou la page a été déplacée. Pas de panique, vous pouvez revenir à l'accueil.</p>
    <a class="err-btn" href="/index.html">Retour à l'accueil</a>
  </main>
</body>
</html>
